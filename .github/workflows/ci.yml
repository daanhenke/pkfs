name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --release
      - name: Test workspace
        run: cargo test --workspace

  lint:
    name: Format & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The vendored pkfs-nitro crate (apicula) is excluded from style checks.
      - name: rustfmt
        run: cargo fmt -p pkfs-rom -p pkfs-2d -p pkfs -p pkfs-cli -p pkfs-gdext -- --check
      - name: clippy
        continue-on-error: true
        run: cargo clippy -p pkfs-rom -p pkfs-2d -p pkfs -p pkfs-cli -p pkfs-gdext --all-targets
